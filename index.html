<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calculadora de Comisiones</title>
    <link rel="stylesheet" href="ventas.css">
    <script src="ventas.js"></script>
    <script src="utilitarios.js"></script>
    <script src="monedas.js" defer></script>
</head>

<body>
    <div id="lluviaMonedas"></div>

    <audio id="sndMonedas" preload="auto">
        <source src="coin.mp3" type="audio/mpeg">
    </audio>

    <div class="contenedor">
        <h1>Calculadora de Comisiones</h1>

        <label>Salario Base:</label>
        <input id="txtSueldoBase" onblur="validarInput('txtSueldoBase', 'errorSueldoBase')">
        <div id="errorSueldoBase" class="mensaje-error"></div>

        <label>Número de ventas:</label>
        <input id="txtVentas" onblur="validarInput('txtVentas', 'errorVentas')">
        <div id="errorVentas" class="mensaje-error"></div>

        <label>Precio del producto:</label>
        <input id="txtPrecio" onblur="validarInput('txtPrecio', 'errorPrecio')">
        <div id="errorPrecio" class="mensaje-error"></div>

        <button id="btnCalcular" onclick="calcular(); celebrarComision(this, document.getElementById('spTotal'));">Calcular Comisión</button>
        
        <h2>Resultados</h2>
        <p>Salario Base: <span id="spSueldoBase"></span></p>
        <p>Comisión: <span id="spComision"></span></p>
        <p>Total: <span id="spTotal"></span></p>
        <button id="btnRest" onclick="reset();">limpiar</button>
    </div>


</body>

</html>
